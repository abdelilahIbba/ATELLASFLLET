# AtellasFleet — Render Blueprint
# Deploy: render.com → New → Blueprint → connect this repo

services:
  - type: web
    name: atellasfleet-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: false
    # /up is Laravel's built-in health route (bootstrap/app.php health:'/up').
    # It returns 200 without any DB query, so it survives DB cold-starts/quotas.
    # nginx also handles /health directly (return 200) as a secondary check.
    healthCheckPath: /up
    plan: free
