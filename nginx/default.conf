# Nginx Reverse Proxy Configuration for Atellas Fleet
#
# Routes:
#   /api/*       → Laravel backend (PHP-FPM via unix socket or TCP)
#   /storage/*   → Laravel public storage (local files)
#   /*           → React SPA (frontend Node container)
#
# HTTPS is served on port 443 with a self-signed certificate so that
# iOS Safari exposes navigator.mediaDevices.getUserMedia() (the camera API
# is unavailable on any non-secure HTTP origin on iOS).
#
# The self-signed cert is generated at container start by the entrypoint
# script and mounted at /etc/nginx/ssl/.

upstream backend_php {
    server backend:9000;
}

upstream frontend_node {
    server frontend:3000;
}

# ── HTTP (localhost dev — no SSL redirect) ──────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    client_max_body_size 20M;

    # ── Laravel public storage (uploaded files) ───────────────────────
    location ^~ /storage/ {
        alias /var/www/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Laravel API ───────────────────────────────────────────────────
    # All /api/* and /sanctum/* requests go to the Laravel PHP-FPM container.
    location ~ ^/(api|sanctum)/ {
        root /var/www/html/public;

        # Pass to PHP-FPM
        fastcgi_pass backend_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;

        fastcgi_param HTTP_X_Forwarded_For   $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_Forwarded_Proto $scheme;
        fastcgi_read_timeout 120s;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
    }

    # ── React SPA ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_node;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
